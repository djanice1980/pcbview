ShortDescription: Ray-traced 3D viewer for KiCad boards and Gerber packages.
Description: |-
  pcbview renders a printed circuit board in 3D from either a KiCad project or a
  Gerber package, with the stated goal of showing what the fab will actually
  build rather than a stylised approximation.

  It offers rasterised, ray-traced (contact shadows and ambient occlusion) and
  fully path-traced rendering with Intel Open Image Denoise, and runs entirely
  on the CPU when no suitable GPU is present. Copper, soldermask, silkscreen,
  plated barrels, blind and buried vias, routed slots and 3D component bodies
  are all modelled, and an exploded view separates the stack.

  Nets can be highlighted and followed through the board, taken from KiCad
  connectivity, from Gerber X2 attributes, or derived from the copper itself
  when a package carries no netlist at all. Measurement tools report fab-exact
  distances and routed net lengths, and the board can be printed or exported at
  up to four times the window resolution.
